id: "@default/wm-bspwm"
target: "@seelen/window-manager"
metadata:
  displayName: !extend i18n/display_name.yml
  description: !extend i18n/description.yml
plugin:
  structure:
    type: Horizontal
    children:
      - type: Leaf # 1
      - type: Vertical
        children:
          - type: Leaf # 2
          - type: Horizontal
            children:
              - type: Vertical
                priority: 2
                children:
                  - type: Horizontal
                    priority: 2
                    children:
                      - type: Leaf # 5
                      - type: Leaf # 6
                  - type: Leaf # 4
                    priority: 1
              - type: Leaf # 3
                priority: 1
