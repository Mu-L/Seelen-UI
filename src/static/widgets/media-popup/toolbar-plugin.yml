id: "@seelen/tb-media-popup"
metadata:
  displayName: !extend i18n/display_name.yml
  description: !extend i18n/description.yml
icon: IoVolumeHighOutline
target: "@seelen/fancy-toolbar"
plugin:
  scopes:
    - Media
  template: |-
    return isMuted
      ? icon("IoVolumeMuteOutline")
      : volume >= 0.66
        ? icon("IoVolumeHighOutline")
        : volume >= 0.33
          ? icon("IoVolumeMediumOutline")
          : volume != 0
            ? icon("IoVolumeLowOutline")
            : icon("IoVolumeOffOutline")
  tooltip: 'return [t("placeholder.volume"), ": ", (volume * 100).toFixed(0), "%"]'
  onClick: |-
    trigger("@seelen/media-popup");
  onWheelUp: |-
    if (defaultOutputDevice) {
      invoke(SeelenCommand.SetVolumeLevel, { deviceId: defaultOutputDevice.id, level: Math.min(1, volume + 0.02), sessionId: null });
    }
  onWheelDown: |-
    if (defaultOutputDevice) {
      invoke(SeelenCommand.SetVolumeLevel, { deviceId: defaultOutputDevice.id, level: Math.max(0, volume - 0.02), sessionId: null });
    }
